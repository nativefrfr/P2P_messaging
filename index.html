<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2P Messaging</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            min-height: 100vh;
            color: #e2e8f0;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 20px;
            height: 90vh;
        }

        .panel {
            background: #1e293b;
            border-radius: 12px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            border: 1px solid #334155;
        }

        .header {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 20px;
            color: #f1f5f9;
        }

        .section {
            margin-bottom: 24px;
        }

        .section-title {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #94a3b8;
            margin-bottom: 12px;
        }

        .your-id {
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 12px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: #cbd5e1;
            word-break: break-all;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
        }

        .copy-btn {
            background: #3b82f6;
            border: none;
            color: white;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            white-space: nowrap;
            transition: background 0.2s;
        }

        .copy-btn:hover {
            background: #2563eb;
        }

        .username-edit {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .username-display {
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 8px 12px;
            flex: 1;
            font-size: 14px;
            color: #f1f5f9;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .username-display span {
            flex: 1;
        }

        .edit-btn {
            background: #64748b;
            border: none;
            color: white;
            padding: 6px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            transition: background 0.2s;
        }

        .edit-btn:hover {
            background: #475569;
        }

        .username-input {
            display: flex;
            gap: 8px;
        }

        .username-input input {
            flex: 1;
            background: #0f172a;
            border: 1px solid #3b82f6;
            border-radius: 8px;
            color: #e2e8f0;
            padding: 8px 12px;
            font-size: 14px;
            font-family: inherit;
        }

        .username-input input:focus {
            outline: none;
            border-color: #60a5fa;
        }

        .username-input button {
            background: #10b981;
            border: none;
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            transition: background 0.2s;
        }

        .username-input button:hover {
            background: #059669;
        }

        .peer-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            flex: 1;
            overflow-y: auto;
        }

        .peer-item {
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 14px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .peer-item:hover {
            background: #1e293b;
            border-color: #64748b;
            transform: translateX(5px);
        }

        .peer-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .peer-name {
            font-size: 14px;
            font-weight: 500;
            color: #f1f5f9;
        }

        .peer-status {
            font-size: 12px;
            color: #94a3b8;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #10b981;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        .peer-list-empty {
            text-align: center;
            color: #64748b;
            padding: 40px 20px;
            font-size: 13px;
        }

        .connection-request {
            background: #1f2937;
            border: 2px solid #f59e0b;
            border-radius: 10px;
            padding: 16px;
            margin-bottom: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .request-text {
            font-size: 14px;
            color: #fbbf24;
        }

        .request-buttons {
            display: flex;
            gap: 8px;
        }

        .btn-allow {
            flex: 1;
            background: #10b981;
            border: none;
            color: white;
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            transition: background 0.2s;
        }

        .btn-allow:hover {
            background: #059669;
        }

        .btn-deny {
            flex: 1;
            background: #ef4444;
            border: none;
            color: white;
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            transition: background 0.2s;
        }

        .btn-deny:hover {
            background: #dc2626;
        }

        .chat-area {
            display: flex;
            flex-direction: column;
            background: #1e293b;
            border-radius: 12px;
            border: 1px solid #334155;
            overflow: hidden;
        }

        .chat-header {
            background: #0f172a;
            padding: 16px 24px;
            border-bottom: 1px solid #334155;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-title {
            font-size: 16px;
            font-weight: 600;
            color: #f1f5f9;
        }

        .disconnect-btn {
            background: #ef4444;
            border: none;
            color: white;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            transition: background 0.2s;
        }

        .disconnect-btn:hover {
            background: #dc2626;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            display: flex;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.sent {
            justify-content: flex-end;
        }

        .message.received {
            justify-content: flex-start;
        }

        .message-bubble {
            max-width: 70%;
            padding: 12px 14px;
            border-radius: 8px;
            font-size: 14px;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .message.sent .message-bubble {
            background: #3b82f6;
            color: white;
            border-bottom-right-radius: 2px;
        }

        .message.received .message-bubble {
            background: #334155;
            color: #e2e8f0;
            border-bottom-left-radius: 2px;
        }

        .message-sender {
            font-size: 12px;
            color: #94a3b8;
            margin-bottom: 4px;
            font-weight: 500;
        }

        .message.sent .message-sender {
            text-align: right;
        }

        .message-time {
            font-size: 11px;
            color: #94a3b8;
            margin-top: 4px;
            padding: 0 4px;
        }

        .message-content {
            display: flex;
            flex-direction: column;
        }

        .chat-input-area {
            padding: 16px;
            border-top: 1px solid #334155;
            display: flex;
            gap: 8px;
        }

        textarea {
            flex: 1;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            color: #e2e8f0;
            padding: 10px 12px;
            font-family: inherit;
            font-size: 14px;
            resize: none;
            min-height: 40px;
            max-height: 100px;
        }

        textarea:focus {
            outline: none;
            border-color: #3b82f6;
        }

        .send-btn {
            background: #3b82f6;
            border: none;
            color: white;
            padding: 10px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: background 0.2s;
            height: 40px;
            display: flex;
            align-items: center;
        }

        .send-btn:hover {
            background: #2563eb;
        }

        .send-btn:disabled {
            background: #64748b;
            cursor: not-allowed;
        }

        .no-chat {
            display: flex;
            align-items: center;
            justify-content: center;
            color: #64748b;
            font-size: 14px;
            height: 100%;
        }

        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
                height: auto;
            }

            .message-bubble {
                max-width: 85%;
            }
        }

        .peer-list {
            scrollbar-width: thin;
            scrollbar-color: #475569 transparent;
        }

        .messages {
            scrollbar-width: thin;
            scrollbar-color: #475569 transparent;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Left Panel -->
        <div class="panel">
            <div class="header">P2P Chat</div>

            <div class="section">
                <div class="section-title">Your Username</div>
                <div id="usernameSection" class="username-display">
                    <span id="usernameDisplay">Anonymous</span>
                    <button class="edit-btn" onclick="p2p.toggleUsernameEdit()">Edit</button>
                </div>
                <div id="usernameEditSection" class="username-input" style="display: none;">
                    <input type="text" id="usernameInput" placeholder="Enter username" maxlength="20">
                    <button onclick="p2p.saveUsername()">Save</button>
                </div>
            </div>

            <div class="section">
                <div class="section-title">Your ID</div>
                <div class="your-id">
                    <span id="yourId">Generating...</span>
                    <button class="copy-btn" onclick="copyToClipboard()">Copy</button>
                </div>
            </div>

            <div class="section" id="requestsSection" style="display: none;">
                <div class="section-title">Connection Requests</div>
                <div id="requestsList"></div>
            </div>

            <div class="section">
                <div class="section-title">Online Peers</div>
                <div class="peer-list" id="peerList">
                    <div class="peer-list-empty">Scanning for peers...</div>
                </div>
            </div>
        </div>

        <!-- Right Panel -->
        <div class="chat-area">
            <div id="chatView">
                <div class="no-chat">Select a peer to start chatting</div>
            </div>
        </div>
    </div>

    <script>
        class P2PMessaging {
            constructor() {
                this.peerId = this.generatePeerId();
                this.username = localStorage.getItem('p2p_username') || 'Anonymous';
                this.peers = new Map();
                this.conversations = new Map();
                this.connectionRequests = new Map();
                this.activePeer = null;
                this.lastMessageCheckTime = {};
                this.messageCheckInterval = null;
                
                this.init();
            }

            generatePeerId() {
                return `p_${Math.random().toString(36).substr(2, 9)}`;
            }

            init() {
                document.getElementById('yourId').textContent = this.peerId;
                document.getElementById('usernameDisplay').textContent = this.username;
                document.getElementById('usernameInput').value = this.username;
                
                this.broadcast();
                setInterval(() => this.broadcast(), 5000);
                setInterval(() => this.scanForPeers(), 3000);
                setInterval(() => this.cleanup(), 8000);
                this.setupUI();
            }

            toggleUsernameEdit() {
                const section = document.getElementById('usernameSection');
                const editSection = document.getElementById('usernameEditSection');
                
                if (editSection.style.display === 'none') {
                    editSection.style.display = 'flex';
                    section.style.display = 'none';
                    document.getElementById('usernameInput').focus();
                } else {
                    editSection.style.display = 'none';
                    section.style.display = 'flex';
                }
            }

            saveUsername() {
                const newUsername = document.getElementById('usernameInput').value.trim();
                
                if (!newUsername) {
                    alert('Username cannot be empty');
                    return;
                }

                this.username = newUsername;
                localStorage.setItem('p2p_username', newUsername);
                document.getElementById('usernameDisplay').textContent = this.username;
                
                this.toggleUsernameEdit();
                this.broadcast();
            }

            broadcast() {
                try {
                    localStorage.setItem(`peer_${this.peerId}`, JSON.stringify({
                        id: this.peerId,
                        username: this.username,
                        timestamp: Date.now()
                    }));
                } catch (e) {}
            }

            scanForPeers() {
                try {
                    for (let key in localStorage) {
                        if (key.startsWith('peer_') && !key.includes('_to_')) {
                            try {
                                const data = JSON.parse(localStorage[key]);
                                if (data.id && data.id !== this.peerId && !this.peers.has(data.id)) {
                                    const age = Date.now() - data.timestamp;
                                    if (age < 10000) { // Only add if less than 10 seconds old
                                        this.peers.set(data.id, { 
                                            lastSeen: Date.now(), 
                                            active: true,
                                            username: data.username || 'Anonymous'
                                        });
                                        this.checkForConnectionRequest(data.id);
                                    }
                                }
                            } catch (e) {}
                        }
                    }
                    this.updatePeerList();
                } catch (e) {}
            }

            checkForConnectionRequest(peerId) {
                try {
                    const key = `request_${peerId}_to_${this.peerId}`;
                    const request = localStorage.getItem(key);
                    if (request && !this.connectionRequests.has(peerId)) {
                        const data = JSON.parse(request);
                        this.connectionRequests.set(peerId, data);
                        this.updateRequests();
                    }
                } catch (e) {}
            }

            connectToPeer(peerId) {
                try {
                    localStorage.setItem(`request_${this.peerId}_to_${peerId}`, JSON.stringify({
                        from: this.peerId,
                        fromUsername: this.username,
                        to: peerId,
                        timestamp: Date.now(),
                        status: 'pending'
                    }));

                    const checkInterval = setInterval(() => {
                        try {
                            const key = `accept_${peerId}_to_${this.peerId}`;
                            const response = localStorage.getItem(key);
                            if (response) {
                                const data = JSON.parse(response);
                                if (data.status === 'accepted') {
                                    clearInterval(checkInterval);
                                    this.activatePeerConnection(peerId, data.username);
                                }
                            }
                        } catch (e) {}
                    }, 200);

                    setTimeout(() => clearInterval(checkInterval), 30000);
                } catch (e) {}
            }

            allowConnection(peerId) {
                try {
                    const peerData = this.peers.get(peerId);
                    const peerUsername = peerData ? peerData.username : 'Anonymous';
                    
                    localStorage.setItem(`accept_${this.peerId}_to_${peerId}`, JSON.stringify({
                        from: this.peerId,
                        username: this.username,
                        to: peerId,
                        status: 'accepted',
                        timestamp: Date.now()
                    }));

                    this.connectionRequests.delete(peerId);
                    this.activatePeerConnection(peerId, peerUsername);
                    this.updateRequests();
                } catch (e) {}
            }

            denyConnection(peerId) {
                try {
                    localStorage.removeItem(`request_${peerId}_to_${this.peerId}`);
                    this.connectionRequests.delete(peerId);
                    this.updateRequests();
                } catch (e) {}
            }

            activatePeerConnection(peerId, peerUsername) {
                if (!this.conversations.has(peerId)) {
                    this.conversations.set(peerId, { 
                        messages: [], 
                        connected: true,
                        peerUsername: peerUsername || 'Anonymous'
                    });
                    this.lastMessageCheckTime[peerId] = 0;
                }
                this.activePeer = peerId;
                this.updatePeerList();
                this.renderChat();
                this.startMessagePolling();
            }

            disconnect() {
                if (this.activePeer) {
                    try {
                        localStorage.removeItem(`connection_${this.peerId}_to_${this.activePeer}`);
                        localStorage.removeItem(`connection_${this.activePeer}_to_${this.peerId}`);
                    } catch (e) {}
                    this.activePeer = null;
                    if (this.messageCheckInterval) {
                        clearInterval(this.messageCheckInterval);
                        this.messageCheckInterval = null;
                    }
                    this.renderChat();
                }
            }

            sendMessage(text) {
                if (!this.activePeer || !text.trim()) return;

                const message = {
                    from: this.peerId,
                    fromUsername: this.username,
                    to: this.activePeer,
                    text: text.trim(),
                    timestamp: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
                    id: `${Date.now()}_${Math.random()}`
                };

                if (!this.conversations.has(this.activePeer)) {
                    this.conversations.set(this.activePeer, { messages: [], connected: true });
                }

                this.conversations.get(this.activePeer).messages.push({ ...message, sent: true });

                try {
                    localStorage.setItem(`msg_${this.peerId}_${this.activePeer}_${message.id}`, JSON.stringify(message));
                } catch (e) {}

                this.renderChat();
            }

            startMessagePolling() {
                if (this.messageCheckInterval) {
                    clearInterval(this.messageCheckInterval);
                }
                
                this.messageCheckInterval = setInterval(() => this.checkForMessages(), 1000);
            }

            checkForMessages() {
                if (!this.activePeer) return;

                try {
                    for (let key in localStorage) {
                        if (key.startsWith(`msg_${this.activePeer}_${this.peerId}_`)) {
                            try {
                                const message = JSON.parse(localStorage[key]);
                                if (!this.conversations.has(this.activePeer)) {
                                    this.conversations.set(this.activePeer, { messages: [], connected: true });
                                }

                                const conv = this.conversations.get(this.activePeer);
                                if (!conv.messages.find(m => m.id === message.id)) {
                                    conv.messages.push({ ...message, sent: false });
                                    this.renderChat();
                                }
                            } catch (e) {}
                        }
                    }
                } catch (e) {}
            }

            updatePeerList() {
                const list = document.getElementById('peerList');
                const onlinePeers = Array.from(this.peers.entries()).filter(([_, data]) => Date.now() - data.lastSeen < 12000);

                if (onlinePeers.length === 0) {
                    list.innerHTML = '<div class="peer-list-empty">No peers online</div>';
                    return;
                }

                list.innerHTML = onlinePeers.map(([peerId, data]) => {
                    const isActive = this.activePeer === peerId;
                    const isConnected = this.conversations.has(peerId) && this.conversations.get(peerId).connected;
                    
                    return `
                        <div class="peer-item ${isActive ? 'peer-item-active' : ''}" onclick="p2p.connectToPeer('${peerId}')">
                            <div class="peer-info">
                                <div class="peer-name">${data.username || 'Anonymous'}</div>
                                <div class="peer-status">${isConnected ? 'Connected' : 'Click to connect'}</div>
                            </div>
                            <div class="status-dot"></div>
                        </div>
                    `;
                }).join('');

                if (!document.getElementById('activePeerStyle')) {
                    const style = document.createElement('style');
                    style.id = 'activePeerStyle';
                    style.textContent = `
                        .peer-item-active {
                            background: #0f172a !important;
                            border-color: #3b82f6 !important;
                        }
                    `;
                    document.head.appendChild(style);
                }
            }

            updateRequests() {
                const section = document.getElementById('requestsSection');
                const list = document.getElementById('requestsList');

                if (this.connectionRequests.size === 0) {
                    section.style.display = 'none';
                    return;
                }

                section.style.display = 'block';
                list.innerHTML = Array.from(this.connectionRequests.entries()).map(([peerId, data]) => `
                    <div class="connection-request">
                        <div class="request-text">${data.fromUsername || 'Anonymous'} is trying to connect</div>
                        <div class="request-buttons">
                            <button class="btn-allow" onclick="p2p.allowConnection('${peerId}')">Allow</button>
                            <button class="btn-deny" onclick="p2p.denyConnection('${peerId}')">Deny</button>
                        </div>
                    </div>
                `).join('');
            }

            renderChat() {
                const chatView = document.getElementById('chatView');

                if (!this.activePeer) {
                    chatView.innerHTML = '<div class="no-chat">Select a peer to start chatting</div>';
                    return;
                }

                const conv = this.conversations.get(this.activePeer);
                const messages = conv?.messages || [];
                const peerUsername = conv?.peerUsername || 'Anonymous';
                const msgInput = document.getElementById('msgInput')?.value || '';

                chatView.innerHTML = `
                    <div class="chat-header">
                        <div class="chat-title">Chatting with ${peerUsername}</div>
                        <button class="disconnect-btn" onclick="p2p.disconnect()">Disconnect</button>
                    </div>
                    <div class="messages">
                        ${messages.length === 0 ? '<div style="text-align: center; color: #64748b; margin-top: 40px;">No messages yet</div>' : messages.map(msg => `
                            <div class="message ${msg.sent ? 'sent' : 'received'}">
                                <div class="message-sender">${msg.fromUsername || (msg.sent ? 'You' : 'Peer')}</div>
                                <div class="message-content">
                                    <div class="message-bubble">${this.escapeHtml(msg.text)}</div>
                                    <div class="message-time">${msg.timestamp}</div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                    <div class="chat-input-area">
                        <textarea id="msgInput" placeholder="Type a message..." onkeypress="if(event.key==='Enter' && !event.shiftKey) { event.preventDefault(); p2p.sendMessage(document.getElementById('msgInput').value); document.getElementById('msgInput').value = ''; document.getElementById('msgInput').focus(); }">${this.escapeHtml(msgInput)}</textarea>
                        <button class="send-btn" onclick="p2p.sendMessage(document.getElementById('msgInput').value); document.getElementById('msgInput').value = ''; document.getElementById('msgInput').focus();"><span>→</span></button>
                    </div>
                `;

                setTimeout(() => {
                    const messagesDiv = chatView.querySelector('.messages');
                    if (messagesDiv) messagesDiv.scrollTop = messagesDiv.scrollHeight;
                    const input = document.getElementById('msgInput');
                    if (input) input.focus();
                }, 0);
            }

            setupUI() {
                this.renderChat();
            }

            cleanup() {
                const now = Date.now();
                for (let [peerId, data] of this.peers.entries()) {
                    if (now - data.lastSeen > 15000) {
                        this.peers.delete(peerId);
                    }
                }
                this.updatePeerList();
            }

            escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }
        }

        let p2p;
        window.addEventListener('DOMContentLoaded', () => {
            p2p = new P2PMessaging();
        });

        function copyToClipboard() {
            const text = p2p.peerId;
            navigator.clipboard.writeText(text).then(() => {
                const btn = event.target;
                btn.textContent = 'Copied!';
                setTimeout(() => btn.textContent = 'Copy', 2000);
            });
        }
    </script>
</body>
</html>
