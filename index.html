<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2P Messaging - WebRTC</title>
    <script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            min-height: 100vh;
            color: #e2e8f0;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 20px;
            height: 90vh;
        }

        .panel {
            background: #1e293b;
            border-radius: 12px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            border: 1px solid #334155;
        }

        .header {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 20px;
            color: #f1f5f9;
        }

        .section {
            margin-bottom: 24px;
        }

        .section-title {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #94a3b8;
            margin-bottom: 12px;
        }

        .your-id {
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 12px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: #cbd5e1;
            word-break: break-all;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
        }

        .copy-btn {
            background: #3b82f6;
            border: none;
            color: white;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            white-space: nowrap;
            transition: background 0.2s;
        }

        .copy-btn:hover {
            background: #2563eb;
        }

        .username-display {
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 8px 12px;
            flex: 1;
            font-size: 14px;
            color: #f1f5f9;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .username-display span {
            flex: 1;
        }

        .edit-btn {
            background: #64748b;
            border: none;
            color: white;
            padding: 6px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            transition: background 0.2s;
        }

        .edit-btn:hover {
            background: #475569;
        }

        .username-input {
            display: flex;
            gap: 8px;
        }

        .username-input input {
            flex: 1;
            background: #0f172a;
            border: 1px solid #3b82f6;
            border-radius: 8px;
            color: #e2e8f0;
            padding: 8px 12px;
            font-size: 14px;
            font-family: inherit;
        }

        .username-input input:focus {
            outline: none;
            border-color: #60a5fa;
        }

        .username-input button {
            background: #10b981;
            border: none;
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            transition: background 0.2s;
        }

        .username-input button:hover {
            background: #059669;
        }

        .connect-input {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }

        .connect-input input {
            flex: 1;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            color: #e2e8f0;
            padding: 8px 12px;
            font-size: 12px;
            font-family: inherit;
        }

        .connect-input input:focus {
            outline: none;
            border-color: #3b82f6;
        }

        .connect-input button {
            background: #3b82f6;
            border: none;
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            white-space: nowrap;
            transition: background 0.2s;
        }

        .connect-input button:hover {
            background: #2563eb;
        }

        .peer-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            flex: 1;
            overflow-y: auto;
        }

        .peer-item {
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 14px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .peer-item:hover {
            background: #1e293b;
            border-color: #64748b;
            transform: translateX(5px);
        }

        .peer-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .peer-name {
            font-size: 14px;
            font-weight: 500;
            color: #f1f5f9;
        }

        .peer-status {
            font-size: 12px;
            color: #94a3b8;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #10b981;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        .peer-list-empty {
            text-align: center;
            color: #64748b;
            padding: 40px 20px;
            font-size: 13px;
        }

        .chat-area {
            display: flex;
            flex-direction: column;
            background: #1e293b;
            border-radius: 12px;
            border: 1px solid #334155;
            overflow: hidden;
        }

        .chat-header {
            background: #0f172a;
            padding: 16px 24px;
            border-bottom: 1px solid #334155;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-title {
            font-size: 16px;
            font-weight: 600;
            color: #f1f5f9;
        }

        .disconnect-btn {
            background: #ef4444;
            border: none;
            color: white;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            transition: background 0.2s;
        }

        .disconnect-btn:hover {
            background: #dc2626;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            display: flex;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.sent {
            justify-content: flex-end;
        }

        .message.received {
            justify-content: flex-start;
        }

        .message-bubble {
            max-width: 70%;
            padding: 12px 14px;
            border-radius: 8px;
            font-size: 14px;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .message.sent .message-bubble {
            background: #3b82f6;
            color: white;
            border-bottom-right-radius: 2px;
        }

        .message.received .message-bubble {
            background: #334155;
            color: #e2e8f0;
            border-bottom-left-radius: 2px;
        }

        .message-sender {
            font-size: 12px;
            color: #94a3b8;
            margin-bottom: 4px;
            font-weight: 500;
        }

        .message.sent .message-sender {
            text-align: right;
        }

        .message-time {
            font-size: 11px;
            color: #94a3b8;
            margin-top: 4px;
            padding: 0 4px;
        }

        .message-content {
            display: flex;
            flex-direction: column;
        }

        .chat-input-area {
            padding: 16px;
            border-top: 1px solid #334155;
            display: flex;
            gap: 8px;
        }

        textarea {
            flex: 1;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            color: #e2e8f0;
            padding: 10px 12px;
            font-family: inherit;
            font-size: 14px;
            resize: none;
            min-height: 40px;
            max-height: 100px;
        }

        textarea:focus {
            outline: none;
            border-color: #3b82f6;
        }

        .send-btn {
            background: #3b82f6;
            border: none;
            color: white;
            padding: 10px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: background 0.2s;
            height: 40px;
            display: flex;
            align-items: center;
        }

        .send-btn:hover {
            background: #2563eb;
        }

        .send-btn:disabled {
            background: #64748b;
            cursor: not-allowed;
        }

        .no-chat {
            display: flex;
            align-items: center;
            justify-content: center;
            color: #64748b;
            font-size: 14px;
            height: 100%;
        }

        .status-indicator {
            font-size: 12px;
            padding: 8px 12px;
            border-radius: 6px;
            margin-bottom: 12px;
        }

        .status-indicator.connecting {
            background: #f59e0b;
            color: #78350f;
        }

        .status-indicator.connected {
            background: #10b981;
            color: #064e3b;
        }

        .status-indicator.error {
            background: #ef4444;
            color: #7f1d1d;
        }

        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
                height: auto;
            }

            .message-bubble {
                max-width: 85%;
            }
        }

        .peer-list {
            scrollbar-width: thin;
            scrollbar-color: #475569 transparent;
        }

        .messages {
            scrollbar-width: thin;
            scrollbar-color: #475569 transparent;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Left Panel -->
        <div class="panel">
            <div class="header">P2P Chat</div>

            <div class="section">
                <div id="statusIndicator" class="status-indicator connecting">🔄 Connecting...</div>
            </div>

            <div class="section">
                <div class="section-title">Your Username</div>
                <div id="usernameSection" class="username-display">
                    <span id="usernameDisplay">Anonymous</span>
                    <button class="edit-btn" onclick="p2p.toggleUsernameEdit()">Edit</button>
                </div>
                <div id="usernameEditSection" class="username-input" style="display: none;">
                    <input type="text" id="usernameInput" placeholder="Enter username" maxlength="20">
                    <button onclick="p2p.saveUsername()">Save</button>
                </div>
            </div>

            <div class="section">
                <div class="section-title">Your ID</div>
                <div class="your-id">
                    <span id="yourId">Loading...</span>
                    <button class="copy-btn" onclick="copyToClipboard()">Copy</button>
                </div>
            </div>

            <div class="section">
                <div class="section-title">Connect to Peer</div>
                <div class="connect-input">
                    <input type="text" id="remotePeerId" placeholder="Paste peer ID here">
                    <button onclick="p2p.connectToPeerId()">Connect</button>
                </div>
            </div>

            <div class="section">
                <div class="section-title">Connected Peers</div>
                <div class="peer-list" id="peerList">
                    <div class="peer-list-empty">No peers connected</div>
                </div>
            </div>
        </div>

        <!-- Right Panel -->
        <div class="chat-area">
            <div id="chatView">
                <div class="no-chat">Select a peer to start chatting</div>
            </div>
        </div>
    </div>

    <script>
        class P2PMessaging {
            constructor() {
                this.peerId = null;
                this.peer = null;
                this.username = localStorage.getItem('p2p_username') || 'Anonymous';
                this.connections = new Map();
                this.peers = new Map();
                this.conversations = new Map();
                this.activePeer = null;
                
                this.init();
            }

            async init() {
                try {
                    this.peer = new Peer({
                        config: {
                            iceServers: [
                                { urls: ['stun:stun.l.google.com:19302'] },
                                { urls: ['stun:stun1.l.google.com:19302'] },
                                { urls: ['stun:stun2.l.google.com:19302'] },
                                { urls: ['stun:stun3.l.google.com:19302'] },
                                { urls: ['stun:stun4.l.google.com:19302'] }
                            ]
                        }
                    });

                    this.peer.on('open', (id) => {
                        this.peerId = id;
                        document.getElementById('yourId').textContent = id;
                        document.getElementById('usernameDisplay').textContent = this.username;
                        document.getElementById('usernameInput').value = this.username;
                        this.updateStatus('connected');
                        this.broadcastPresence();
                        setInterval(() => this.broadcastPresence(), 15000);
                    });

                    this.peer.on('connection', (conn) => {
                        this.handleIncomingConnection(conn);
                    });

                    this.peer.on('error', (err) => {
                        console.error('Peer error:', err);
                        this.updateStatus('error');
                    });
                } catch (e) {
                    console.error('Failed to initialize Peer:', e);
                    this.updateStatus('error');
                }
            }

            updateStatus(status) {
                const indicator = document.getElementById('statusIndicator');
                if (status === 'connected') {
                    indicator.textContent = '✓ Connected';
                    indicator.className = 'status-indicator connected';
                } else if (status === 'connecting') {
                    indicator.textContent = '🔄 Connecting...';
                    indicator.className = 'status-indicator connecting';
                } else if (status === 'error') {
                    indicator.textContent = '✗ Connection Error';
                    indicator.className = 'status-indicator error';
                }
            }

            broadcastPresence() {
                try {
                    localStorage.setItem(`p2p_peer_${this.peerId}`, JSON.stringify({
                        id: this.peerId,
                        username: this.username,
                        timestamp: Date.now()
                    }));
                } catch (e) {}
            }

            toggleUsernameEdit() {
                const section = document.getElementById('usernameSection');
                const editSection = document.getElementById('usernameEditSection');
                
                if (editSection.style.display === 'none') {
                    editSection.style.display = 'flex';
                    section.style.display = 'none';
                    document.getElementById('usernameInput').focus();
                } else {
                    editSection.style.display = 'none';
                    section.style.display = 'flex';
                }
            }

            saveUsername() {
                const newUsername = document.getElementById('usernameInput').value.trim();
                
                if (!newUsername) {
                    alert('Username cannot be empty');
                    return;
                }

                this.username = newUsername;
                localStorage.setItem('p2p_username', newUsername);
                document.getElementById('usernameDisplay').textContent = this.username;
                
                this.toggleUsernameEdit();
                this.broadcastPresence();
                
                this.connections.forEach(conn => {
                    try {
                        conn.send({ type: 'username_update', username: this.username });
                    } catch (e) {}
                });
            }

            connectToPeerId() {
                const remotePeerId = document.getElementById('remotePeerId').value.trim();
                
                if (!remotePeerId) {
                    alert('Please enter a peer ID');
                    return;
                }

                if (remotePeerId === this.peerId) {
                    alert('Cannot connect to yourself');
                    return;
                }

                if (this.connections.has(remotePeerId)) {
                    alert('Already connected to this peer');
                    return;
                }

                this.initiateConnection(remotePeerId);
                document.getElementById('remotePeerId').value = '';
            }

            initiateConnection(remotePeerId) {
                if (this.connections.has(remotePeerId)) return;

                const conn = this.peer.connect(remotePeerId, { reliable: true });
                this.handleOutgoingConnection(conn, remotePeerId);
            }

            handleOutgoingConnection(conn, remotePeerId) {
                conn.on('open', () => {
                    console.log('Connected to', remotePeerId);
                    conn.send({
                        type: 'intro',
                        peerId: this.peerId,
                        username: this.username
                    });

                    this.connections.set(remotePeerId, conn);
                    this.peers.set(remotePeerId, { username: 'Peer', connected: true });
                    this.updatePeerList();
                });

                conn.on('data', (data) => {
                    this.handleMessage(data, remotePeerId);
                });

                conn.on('close', () => {
                    console.log('Disconnected from', remotePeerId);
                    this.connections.delete(remotePeerId);
                    if (this.activePeer === remotePeerId) {
                        this.activePeer = null;
                        this.renderChat();
                    }
                    this.updatePeerList();
                });

                conn.on('error', (err) => {
                    console.error('Connection error:', err);
                    this.connections.delete(remotePeerId);
                    alert('Failed to connect to peer. Make sure the ID is correct.');
                });
            }

            handleIncomingConnection(conn) {
                const remotePeerId = conn.peer;

                conn.on('open', () => {
                    console.log('Incoming connection from', remotePeerId);
                });

                conn.on('data', (data) => {
                    if (data.type === 'intro') {
                        this.connections.set(remotePeerId, conn);
                        this.peers.set(remotePeerId, {
                            username: data.username || 'Peer',
                            connected: true
                        });

                        conn.send({
                            type: 'ack',
                            username: this.username
                        });

                        this.updatePeerList();
                    } else if (data.type === 'ack') {
                        const peerData = this.peers.get(remotePeerId);
                        if (peerData) {
                            peerData.username = data.username || 'Peer';
                            this.updatePeerList();
                        }
                    } else {
                        this.handleMessage(data, remotePeerId);
                    }
                });

                conn.on('close', () => {
                    console.log('Disconnected from', remotePeerId);
                    this.connections.delete(remotePeerId);
                    if (this.activePeer === remotePeerId) {
                        this.activePeer = null;
                        this.renderChat();
                    }
                    this.updatePeerList();
                });

                conn.on('error', (err) => {
                    console.error('Incoming connection error:', err);
                });
            }

            handleMessage(data, remotePeerId) {
                if (data.type === 'message') {
                    if (!this.conversations.has(remotePeerId)) {
                        this.conversations.set(remotePeerId, { messages: [] });
                    }

                    const conv = this.conversations.get(remotePeerId);
                    conv.messages.push({
                        from: remotePeerId,
                        fromUsername: data.username || 'Peer',
                        text: data.text,
                        timestamp: data.timestamp || new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
                        sent: false
                    });

                    if (this.activePeer === remotePeerId) {
                        this.renderChat();
                    }
                } else if (data.type === 'username_update') {
                    const peerData = this.peers.get(remotePeerId);
                    if (peerData) {
                        peerData.username = data.username;
                        this.updatePeerList();
                        if (this.activePeer === remotePeerId) {
                            this.renderChat();
                        }
                    }
                }
            }

            selectPeer(remotePeerId) {
                this.activePeer = remotePeerId;
                this.updatePeerList();
                this.renderChat();
            }

            sendMessage(text) {
                if (!this.activePeer || !text.trim()) return;
                if (!this.connections.has(this.activePeer)) {
                    alert('Not connected to this peer');
                    return;
                }

                const message = {
                    type: 'message',
                    from: this.peerId,
                    username: this.username,
                    text: text.trim(),
                    timestamp: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
                };

                if (!this.conversations.has(this.activePeer)) {
                    this.conversations.set(this.activePeer, { messages: [] });
                }

                this.conversations.get(this.activePeer).messages.push({
                    from: this.peerId,
                    fromUsername: this.username,
                    text: text.trim(),
                    timestamp: message.timestamp,
                    sent: true
                });

                try {
                    this.connections.get(this.activePeer).send(message);
                } catch (e) {
                    console.error('Failed to send message:', e);
                    alert('Failed to send message');
                }

                this.renderChat();
            }

            disconnect() {
                if (this.activePeer && this.connections.has(this.activePeer)) {
                    this.connections.get(this.activePeer).close();
                    this.connections.delete(this.activePeer);
                    this.activePeer = null;
                    this.renderChat();
                    this.updatePeerList();
                }
            }

            updatePeerList() {
                const list = document.getElementById('peerList');
                const connectedPeers = Array.from(this.connections.keys()).map(peerId => {
                    const peerData = this.peers.get(peerId) || { username: 'Unknown', connected: true };
                    return [peerId, peerData];
                });

                if (connectedPeers.length === 0) {
                    list.innerHTML = '<div class="peer-list-empty">No peers connected</div>';
                    return;
                }

                list.innerHTML = connectedPeers.map(([peerId, data]) => {
                    const isActive = this.activePeer === peerId;
                    
                    return `
                        <div class="peer-item ${isActive ? 'peer-item-active' : ''}" onclick="p2p.selectPeer('${peerId}')">
                            <div class="peer-info">
                                <div class="peer-name">${this.escapeHtml(data.username)}</div>
                                <div class="peer-status">Connected</div>
                            </div>
                            <div class="status-dot"></div>
                        </div>
                    `;
                }).join('');

                if (!document.getElementById('activePeerStyle')) {
                    const style = document.createElement('style');
                    style.id = 'activePeerStyle';
                    style.textContent = `
                        .peer-item-active {
                            background: #0f172a !important;
                            border-color: #3b82f6 !important;
                        }
                    `;
                    document.head.appendChild(style);
                }
            }

            renderChat() {
                const chatView = document.getElementById('chatView');

                if (!this.activePeer) {
                    chatView.innerHTML = '<div class="no-chat">Select a peer to start chatting</div>';
                    return;
                }

                const messages = this.conversations.get(this.activePeer)?.messages || [];
                const peerData = this.peers.get(this.activePeer);
                const peerUsername = peerData?.username || 'Peer';
                const msgInput = document.getElementById('msgInput')?.value || '';

                chatView.innerHTML = `
                    <div class="chat-header">
                        <div class="chat-title">Chatting with ${this.escapeHtml(peerUsername)}</div>
                        <button class="disconnect-btn" onclick="p2p.disconnect()">Disconnect</button>
                    </div>
                    <div class="messages">
                        ${messages.length === 0 ? '<div style="text-align: center; color: #64748b; margin-top: 40px;">No messages yet</div>' : messages.map(msg => `
                            <div class="message ${msg.sent ? 'sent' : 'received'}">
                                <div class="message-sender">${this.escapeHtml(msg.fromUsername || (msg.sent ? 'You' : 'Peer'))}</div>
                                <div class="message-content">
                                    <div class="message-bubble">${this.escapeHtml(msg.text)}</div>
                                    <div class="message-time">${msg.timestamp}</div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                    <div class="chat-input-area">
                        <textarea id="msgInput" placeholder="Type a message..." onkeypress="if(event.key==='Enter' && !event.shiftKey) { event.preventDefault(); p2p.sendMessage(document.getElementById('msgInput').value); document.getElementById('msgInput').value = ''; document.getElementById('msgInput').focus(); }">${this.escapeHtml(msgInput)}</textarea>
                        <button class="send-btn" onclick="p2p.sendMessage(document.getElementById('msgInput').value); document.getElementById('msgInput').value = ''; document.getElementById('msgInput').focus();"><span>→</span></button>
                    </div>
                `;

                setTimeout(() => {
                    const messagesDiv = chatView.querySelector('.messages');
                    if (messagesDiv) messagesDiv.scrollTop = messagesDiv.scrollHeight;
                    const input = document.getElementById('msgInput');
                    if (input) input.focus();
                }, 0);
            }

            escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }
        }

        let p2p;
        window.addEventListener('DOMContentLoaded', () => {
            p2p = new P2PMessaging();
        });

        function copyToClipboard() {
            const text = p2p.peerId;
            if (!text) {
                alert('Peer ID not ready yet');
                return;
            }
            navigator.clipboard.writeText(text).then(() => {
                const btn = event.target;
                btn.textContent = 'Copied!';
                setTimeout(() => btn.textContent = 'Copy', 2000);
            }).catch(() => {
                alert('Failed to copy: ' + text);
            });
        }
    </script>
</body>
</html>
